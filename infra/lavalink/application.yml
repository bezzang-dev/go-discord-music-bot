server:
  port: 2333

lavalink:
  server:
    password: ${LAVALINK_PASSWORD:dev-lavalink-pass}
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      nico: true
      http: false
      local: false
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
      - WEBEMBEDDED
